name: End to End tests
on:
  push:
    branches:
      - main
      - packaging

jobs:
  run:
    name: Run integration tests
    runs-on: deti-tqs-24
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          cat <<EOF > src/test/resources/application-test.properties
          frontend.base-url=http://deti-tqs-24.ua.pt
          spring.datasource.url=$STAGING_DB_URL
          testcontainers.enabled=false
          selenium.docker=true
          EOF

          mvn -B test -Dtest=com.nikogrid.backend.TestCucumberRunner

      - name: Import results to Xray
        if: always()
        uses: mikepenz/xray-action@v3
        with:
          username: ${{ secrets.XRAY_CLIENT_ID }}
          password: ${{ secrets.XRAY_CLIENT_SECRET }}
          testFormat: "cucumber"
          testPaths: "backend/target/report.json"
          projectKey: "NIK"
