- name: Setup cluster
  tags:
    - k8s
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Import k3s server role
      ansible.builtin.import_role:
        name: k3s.orchestration.k3s_server

    - name: install pip
      ansible.builtin.apt:
        name: python3-pip

    - name: install python kubernetes library
      ansible.builtin.pip:
        name: kubernetes

- name: Install ArgoCD
  tags:
    - k8s
  hosts: k3s_cluster
  tasks:
    - name: Create argocd namespace
      kubernetes.core.k8s:
        name: argocd
        api_version: v1
        kind: Namespace

    - name: Download argocd manifest to the cluster.
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        dest: ~/argocd-install.yaml
        mode: "0664"

    - name: Apply argocd manifest to the cluster.
      kubernetes.core.k8s:
        apply: true
        namespace: argocd
        src: ~/argocd-install.yaml

- name: Install CloudNativePG
  tags:
    - cnpg
  hosts: k3s_cluster
  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        name: cnpg-system
        api_version: v1
        kind: Namespace

    - name: Download CloudNativePG manifest to the cluster.
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.26/releases/cnpg-1.26.0.yaml
        dest: ~/cloud-native-pg-install.yaml
        mode: "0664"

    - name: Apply cloud native pg manifest to the cluster.
      kubernetes.core.k8s:
        namespace: argocd
        src: ~/cloud-native-pg-install.yaml
        apply: true
        server_side_apply:
          field_manager: ansible
